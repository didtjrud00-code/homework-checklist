<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Definition Pop! Word Game</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2f3142;
      --muted: #6d7186;
      --line: #dcdff0;
      --paper: #fffdf8;
      --mint: #b9f4dc;
      --mint-dark: #4cae83;
      --coral: #ff8f8a;
      --yellow: #ffd972;
      --blue: #9fd7ff;
      --lav: #d8c7ff;
      --shadow: 0 18px 45px rgba(47, 49, 66, .14);
      font-family: "Nunito", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 16%, rgba(255, 217, 114, .34) 0 12%, transparent 13%),
        radial-gradient(circle at 86% 18%, rgba(185, 244, 220, .42) 0 11%, transparent 12%),
        linear-gradient(135deg, #fff7ed 0%, #eef9ff 48%, #fff5fb 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(1120px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 0 30px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 10px 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      filter: drop-shadow(0 8px 12px rgba(47, 49, 66, .13));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.6vw, 2.35rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-weight: 800;
      font-size: .94rem;
    }

    .status {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      min-height: 38px;
      padding: 8px 13px;
      border: 2px solid rgba(47, 49, 66, .08);
      border-radius: 999px;
      background: rgba(255, 255, 255, .74);
      box-shadow: 0 8px 18px rgba(47, 49, 66, .07);
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(270px, 370px) minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel,
    .game {
      border: 2px solid rgba(47, 49, 66, .08);
      background: rgba(255, 253, 248, .86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel {
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
      overflow: hidden;
      position: relative;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: auto -26px -34px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: repeating-linear-gradient(45deg, rgba(255, 143, 138, .26) 0 10px, rgba(255, 217, 114, .28) 10px 20px);
      opacity: .75;
    }

    .mascot {
      width: min(100%, 260px);
      margin: 2px auto 0;
      display: block;
      position: relative;
      z-index: 1;
    }

    .round-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .round-dot {
      height: 48px;
      border-radius: 8px;
      border: 2px solid var(--line);
      background: #fff;
      display: grid;
      place-items: center;
      font-weight: 1000;
      color: var(--muted);
    }

    .round-dot.active {
      border-color: #50bc90;
      background: var(--mint);
      color: #196348;
    }

    .round-dot.done {
      border-color: #f3bd43;
      background: #fff0b8;
      color: #946300;
    }

    .tiny-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 1000;
      text-transform: uppercase;
    }

    .score-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .score-box {
      min-height: 78px;
      border-radius: 8px;
      border: 2px solid var(--line);
      background: #fff;
      padding: 12px;
    }

    .score-label {
      display: block;
      color: var(--muted);
      font-size: .83rem;
      font-weight: 900;
    }

    .score-value {
      display: block;
      margin-top: 4px;
      font-size: 1.7rem;
      font-weight: 1000;
    }

    .game {
      border-radius: 8px;
      min-height: 640px;
      padding: clamp(18px, 3vw, 30px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .prompt {
      min-height: 228px;
      border: 2px dashed #cfd4e8;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.78), rgba(255,255,255,.48)),
        repeating-linear-gradient(-45deg, rgba(159, 215, 255, .22) 0 12px, rgba(216, 199, 255, .18) 12px 24px);
      padding: clamp(16px, 3vw, 26px);
      display: grid;
      align-items: center;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
    }

    .mode-kicker {
      color: #3b7c64;
      font-size: .88rem;
      font-weight: 1000;
      text-transform: uppercase;
    }

    .question-title {
      margin: 8px 0 0;
      font-size: clamp(1.5rem, 4vw, 3rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.48;
      font-weight: 800;
      max-width: 620px;
    }

    .listen {
      width: 94px;
      height: 94px;
      border: 0;
      border-radius: 50%;
      background: #ff8f8a;
      color: #fff;
      box-shadow: 0 12px 0 #d9605f, 0 22px 28px rgba(217, 96, 95, .24);
      font-size: 2.25rem;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .listen:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 0 #d9605f, 0 25px 30px rgba(217, 96, 95, .22);
    }

    .listen:active {
      transform: translateY(5px);
      box-shadow: 0 7px 0 #d9605f, 0 15px 20px rgba(217, 96, 95, .2);
    }

    .wordbox {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 12px;
    }

    .word-btn {
      min-height: 70px;
      border: 2px solid rgba(47, 49, 66, .1);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 1.08rem;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 8px 0 #e7e3d8, 0 15px 20px rgba(47, 49, 66, .08);
      transition: transform .14s ease, box-shadow .14s ease, background .14s ease;
    }

    .word-btn:nth-child(4n + 1) { background: #fff8cf; }
    .word-btn:nth-child(4n + 2) { background: #ddf8ed; }
    .word-btn:nth-child(4n + 3) { background: #e9e0ff; }
    .word-btn:nth-child(4n + 4) { background: #dff2ff; }

    .word-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 11px 0 #e7e3d8, 0 18px 20px rgba(47, 49, 66, .08);
    }

    .word-btn:disabled {
      cursor: default;
      opacity: .62;
    }

    .word-btn.correct {
      background: #b9f4dc;
      border-color: #44b983;
      opacity: 1;
    }

    .word-btn.wrong {
      background: #ffd5d3;
      border-color: #ff7770;
      opacity: 1;
    }

    .feedback {
      min-height: 88px;
      border-radius: 8px;
      border: 2px solid var(--line);
      background: #fff;
      padding: 15px 16px;
      font-weight: 900;
      line-height: 1.45;
      color: var(--muted);
    }

    .feedback strong {
      color: var(--ink);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: auto;
      flex-wrap: wrap;
    }

    .action {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--ink);
      color: #fff;
      font: inherit;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 9px 0 #171927;
    }

    .action.secondary {
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--line);
      box-shadow: 0 7px 0 #e7e3d8;
    }

    .action:disabled {
      opacity: .5;
      cursor: default;
      transform: none;
    }

    .review-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .review-chip {
      border-radius: 999px;
      border: 2px solid #f1c5c3;
      background: #fff2f1;
      padding: 7px 11px;
      font-size: .92rem;
      font-weight: 1000;
      color: #8c3f3c;
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 18px, 560px);
        padding-top: 12px;
      }

      header,
      main {
        display: block;
      }

      .status {
        justify-content: flex-start;
        margin-top: 14px;
      }

      .panel {
        margin-bottom: 12px;
      }

      .mascot {
        width: 170px;
      }

      .game {
        min-height: auto;
      }

      .prompt {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .listen {
        width: 82px;
        height: 82px;
        justify-self: end;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="brand">
        <svg class="logo" viewBox="0 0 120 120" aria-hidden="true">
          <defs>
            <linearGradient id="bookGrad" x1="0" x2="1">
              <stop offset="0" stop-color="#ff8f8a"/>
              <stop offset="1" stop-color="#ffd972"/>
            </linearGradient>
          </defs>
          <path d="M20 30c0-10 8-18 18-18h48c8 0 14 6 14 14v62c0 8-6 14-14 14H36c-9 0-16-7-16-16V30z" fill="url(#bookGrad)"/>
          <path d="M35 28h47c3 0 5 2 5 5v48c0 3-2 5-5 5H35c-5 0-9 4-9 9V37c0-5 4-9 9-9z" fill="#fffdf8"/>
          <path d="M43 48c4 0 7 3 7 7s-3 7-7 7-7-3-7-7 3-7 7-7zm34 0c4 0 7 3 7 7s-3 7-7 7-7-3-7-7 3-7 7-7z" fill="#2f3142"/>
          <path d="M53 71c5 5 14 5 19 0" fill="none" stroke="#2f3142" stroke-width="5" stroke-linecap="round"/>
          <path d="M30 93h56" stroke="#2f3142" stroke-width="6" stroke-linecap="round" opacity=".18"/>
        </svg>
        <div>
          <h1>Definition Pop!</h1>
          <p class="subtitle">정의를 듣고 알맞은 단어를 톡 골라요</p>
        </div>
      </div>
      <div class="status" aria-live="polite">
        <div class="pill" id="roundPill">Round 1 / 5</div>
        <div class="pill" id="questionPill">Question 1 / 10</div>
        <div class="pill" id="wrongPill">Review 0</div>
      </div>
    </header>

    <main>
      <aside class="panel" aria-label="game progress">
        <div>
          <svg class="mascot" viewBox="0 0 260 220" aria-hidden="true">
            <path d="M31 154c7-26 30-42 60-50 8-40 37-71 72-68 39 4 61 42 56 83 17 7 28 20 30 38 4 35-31 57-86 57-69 0-142-12-132-60z" fill="#b9f4dc"/>
            <path d="M100 103c2-31 25-55 55-53 32 2 51 30 48 64-3 36-25 60-56 58-31-2-49-31-47-69z" fill="#fffdf8"/>
            <path d="M123 43l-15-22c-3-4 1-9 6-7l28 14m44 20l22-16c4-3 9 1 7 6l-11 28" fill="#b9f4dc" stroke="#2f3142" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="134" cy="105" r="8" fill="#2f3142"/>
            <circle cx="180" cy="105" r="8" fill="#2f3142"/>
            <path d="M148 130c7 7 20 7 27 0" fill="none" stroke="#2f3142" stroke-width="6" stroke-linecap="round"/>
            <path d="M74 141c-24 7-40 21-43 43m185-38c21 8 32 22 33 39" fill="none" stroke="#2f3142" stroke-width="7" stroke-linecap="round"/>
            <path d="M68 182h42m71 0h42" stroke="#2f3142" stroke-width="7" stroke-linecap="round"/>
            <circle cx="113" cy="124" r="8" fill="#ffb8b5"/>
            <circle cx="200" cy="124" r="8" fill="#ffb8b5"/>
          </svg>
          <p class="tiny-title">Round Trail</p>
          <div class="round-list" id="roundList"></div>
        </div>

        <div>
          <p class="tiny-title">Score</p>
          <div class="score-card">
            <div class="score-box">
              <span class="score-label">이번 라운드</span>
              <span class="score-value" id="roundScore">0</span>
            </div>
            <div class="score-box">
              <span class="score-label">전체 정답</span>
              <span class="score-value" id="totalScore">0</span>
            </div>
          </div>
          <div class="review-list" id="reviewList" aria-label="wrong words"></div>
        </div>
      </aside>

      <section class="game">
        <div class="prompt">
          <div>
            <div class="mode-kicker" id="modeKicker">Listen Mode</div>
            <h2 class="question-title" id="questionTitle">정의를 들어보세요</h2>
            <p class="hint" id="hintText">스피커를 누르면 영어 definition을 읽어 줍니다.</p>
          </div>
          <button class="listen" id="listenBtn" title="definition 듣기" aria-label="definition 듣기">▶</button>
        </div>

        <div class="wordbox" id="wordbox" aria-label="answer choices"></div>

        <div class="feedback" id="feedback" aria-live="polite">
          준비되면 스피커를 누르고, 아래 wordbox에서 정답을 골라 주세요.
        </div>

        <div class="actions">
          <button class="action secondary" id="restartBtn">처음부터</button>
          <button class="action" id="nextBtn" disabled>다음</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const WORDS = [
      { word: "officer", part: "n", definition: "a person who has authority in a government or business" },
      { word: "least", part: "adj", definition: "a superlative of little; smallest in size, amount, or degree" },
      { word: "border", part: "n", definition: "the line between two countries or other areas that have a government" },
      { word: "cost", part: "n", definition: "the amount of money needed to buy something" },
      { word: "farmhouse", part: "n", definition: "a house on a farm, usually the one in which the farm owner or operator lives" },
      { word: "mystery", part: "n", definition: "a matter that is secret or that cannot be known or explained" },
      { word: "final", part: "adj", definition: "happening at or being the end of something; last" },
      { word: "enormous", part: "adj", definition: "very large in size or amount; huge" },
      { word: "information", part: "n", definition: "knowledge or facts about anything" },
      { word: "press", part: "v", definition: "to put pressure on something, often with one's hands" },
      { word: "state", part: "n", definition: "the condition of a person or thing" },
      { word: "own", part: "adj", definition: "belonging to oneself or itself alone" },
      { word: "send", part: "v", definition: "to cause to be carried to another place, especially by mail" },
      { word: "value", part: "n", definition: "the worth or importance of something" },
      { word: "charge", part: "v", definition: "to ask for a certain amount of money as the price of something" },
      { word: "general", part: "adj", definition: "having to do with some thing or group as a whole; not connected with or concerning any one thing in particular" },
      { word: "steal", part: "v", definition: "to take something from another person without permission and in a way that is against the law" },
      { word: "row", part: "v", definition: "to cause a boat to move forward using oars" },
      { word: "within", part: "prep", definition: "inside of" },
      { word: "bit", part: "n", definition: "a small amount or a little piece of something" }
    ];

    const QUESTIONS_PER_ROUND = 10;
    const TOTAL_ROUNDS = 5;
    const MAX_CHOICES = 10;

    const els = {
      roundPill: document.querySelector("#roundPill"),
      questionPill: document.querySelector("#questionPill"),
      wrongPill: document.querySelector("#wrongPill"),
      roundList: document.querySelector("#roundList"),
      roundScore: document.querySelector("#roundScore"),
      totalScore: document.querySelector("#totalScore"),
      reviewList: document.querySelector("#reviewList"),
      modeKicker: document.querySelector("#modeKicker"),
      questionTitle: document.querySelector("#questionTitle"),
      hintText: document.querySelector("#hintText"),
      listenBtn: document.querySelector("#listenBtn"),
      wordbox: document.querySelector("#wordbox"),
      feedback: document.querySelector("#feedback"),
      nextBtn: document.querySelector("#nextBtn"),
      restartBtn: document.querySelector("#restartBtn")
    };

    let state;

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startGame() {
      state = {
        mode: "game",
        round: 1,
        questionIndex: 0,
        roundScore: 0,
        totalScore: 0,
        answered: false,
        roundQuestions: [],
        current: null,
        wrongMap: new Map(),
        reviewQueue: []
      };
      buildRound();
    }

    function buildRound() {
      state.mode = "game";
      state.questionIndex = 0;
      state.roundScore = 0;
      state.roundQuestions = shuffle(WORDS).slice(0, QUESTIONS_PER_ROUND);
      loadQuestion();
    }

    function startReview() {
      state.mode = "review";
      state.reviewQueue = shuffle([...state.wrongMap.values()]);
      state.questionIndex = 0;
      state.roundScore = 0;
      loadQuestion();
    }

    function loadQuestion() {
      state.answered = false;
      state.current = state.mode === "review"
        ? state.reviewQueue[state.questionIndex]
        : state.roundQuestions[state.questionIndex];

      updateChrome();
      renderChoices();
      els.nextBtn.disabled = true;
      els.feedback.textContent = "준비되면 스피커를 누르고, 아래 wordbox에서 정답을 골라 주세요.";
      els.modeKicker.textContent = state.mode === "review" ? "Review Mode" : "Listen Mode";
      els.questionTitle.textContent = state.mode === "review" ? "오답 복습 시간" : "정의를 들어보세요";
      els.hintText.textContent = state.mode === "review"
        ? "복습에서 맞힌 단어는 오답 목록에서 사라집니다."
        : "스피커를 누르면 영어 definition을 읽어 줍니다.";
      window.setTimeout(speakCurrent, 350);
    }

    function renderChoices() {
      const current = state.current;
      const distractors = shuffle(WORDS.filter(item => item.word !== current.word))
        .slice(0, MAX_CHOICES - 1);
      const choices = shuffle([current, ...distractors]);

      els.wordbox.innerHTML = "";
      choices.forEach(item => {
        const button = document.createElement("button");
        button.className = "word-btn";
        button.type = "button";
        button.textContent = item.word;
        button.addEventListener("click", () => answer(item.word, button));
        els.wordbox.appendChild(button);
      });
    }

    function answer(chosenWord, button) {
      if (state.answered) return;

      state.answered = true;
      const correct = chosenWord === state.current.word;
      const buttons = [...document.querySelectorAll(".word-btn")];
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === state.current.word) btn.classList.add("correct");
      });

      if (correct) {
        state.roundScore += 1;
        if (state.mode === "game") state.totalScore += 1;
        if (state.mode === "review") state.wrongMap.delete(state.current.word);
        els.feedback.innerHTML = `<strong>정답!</strong> ${state.current.word} (${state.current.part}) - ${state.current.definition}`;
      } else {
        button.classList.add("wrong");
        if (state.mode === "game") state.wrongMap.set(state.current.word, state.current);
        els.feedback.innerHTML = `<strong>아쉬워요.</strong> 정답은 <strong>${state.current.word}</strong> (${state.current.part}) 입니다. ${state.current.definition}`;
      }

      els.nextBtn.disabled = false;
      updateChrome();
    }

    function goNext() {
      if (!state.answered && state.current) return;

      if (state.mode === "review") {
        state.questionIndex += 1;
        if (state.questionIndex >= state.reviewQueue.length) {
          finishReview();
        } else {
          loadQuestion();
        }
        return;
      }

      state.questionIndex += 1;
      if (state.questionIndex < QUESTIONS_PER_ROUND) {
        loadQuestion();
        return;
      }

      if (state.round < TOTAL_ROUNDS) {
        state.round += 1;
        showRoundBreak();
      } else {
        showGameComplete();
      }
    }

    function showRoundBreak() {
      updateChrome();
      els.modeKicker.textContent = "Round Clear";
      els.questionTitle.textContent = `Round ${state.round - 1} 끝!`;
      els.hintText.textContent = "다음 라운드를 시작하면 새로운 10문항이 나옵니다.";
      els.wordbox.innerHTML = "";
      els.feedback.innerHTML = `<strong>이번 라운드 점수:</strong> ${state.roundScore} / ${QUESTIONS_PER_ROUND}`;
      els.nextBtn.disabled = false;
      els.nextBtn.textContent = `Round ${state.round} 시작`;
    }

    function showGameComplete() {
      updateChrome();
      els.modeKicker.textContent = "All Rounds Done";
      els.questionTitle.textContent = "5라운드 완료!";
      els.hintText.textContent = state.wrongMap.size
        ? "이제 틀린 단어만 모아서 복습합니다."
        : "틀린 단어가 없어요. 완벽하게 끝났습니다.";
      els.wordbox.innerHTML = "";
      els.feedback.innerHTML = `<strong>전체 정답:</strong> ${state.totalScore} / ${QUESTIONS_PER_ROUND * TOTAL_ROUNDS}`;
      els.nextBtn.disabled = false;
      els.nextBtn.textContent = state.wrongMap.size ? "오답 복습 시작" : "다시 시작";
    }

    function finishReview() {
      updateChrome();
      els.modeKicker.textContent = "Review Complete";
      els.questionTitle.textContent = state.wrongMap.size ? "아직 조금 남았어요" : "오답 목록이 비었어요!";
      els.hintText.textContent = state.wrongMap.size
        ? "남은 오답만 다시 복습할 수 있습니다."
        : "맞힌 단어는 모두 오답 목록에서 제거되었습니다.";
      els.wordbox.innerHTML = "";
      els.feedback.innerHTML = state.wrongMap.size
        ? `<strong>남은 오답:</strong> ${[...state.wrongMap.keys()].join(", ")}`
        : "<strong>멋져요!</strong> 복습까지 완료했습니다.";
      els.nextBtn.disabled = false;
      els.nextBtn.textContent = state.wrongMap.size ? "남은 오답 다시 풀기" : "새 게임";
    }

    function updateChrome() {
      const isReview = state.mode === "review";
      const questionTotal = isReview ? Math.max(state.reviewQueue.length, 1) : QUESTIONS_PER_ROUND;
      const questionNow = state.current ? Math.min(state.questionIndex + 1, questionTotal) : questionTotal;
      els.roundPill.textContent = isReview ? "Review" : `Round ${state.round} / ${TOTAL_ROUNDS}`;
      els.questionPill.textContent = isReview
        ? `Review ${questionNow} / ${questionTotal}`
        : `Question ${questionNow} / ${QUESTIONS_PER_ROUND}`;
      els.wrongPill.textContent = `Review ${state.wrongMap.size}`;
      els.roundScore.textContent = state.roundScore;
      els.totalScore.textContent = state.totalScore;
      els.nextBtn.textContent = "다음";

      els.roundList.innerHTML = "";
      for (let i = 1; i <= TOTAL_ROUNDS; i += 1) {
        const dot = document.createElement("div");
        dot.className = "round-dot";
        if (!isReview && i === state.round) dot.classList.add("active");
        if (i < state.round || isReview) dot.classList.add("done");
        dot.textContent = i;
        els.roundList.appendChild(dot);
      }

      els.reviewList.innerHTML = "";
      [...state.wrongMap.keys()].forEach(word => {
        const chip = document.createElement("span");
        chip.className = "review-chip";
        chip.textContent = word;
        els.reviewList.appendChild(chip);
      });
    }

    function speakCurrent() {
      if (!state.current || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(state.current.definition);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1.06;
      window.speechSynthesis.speak(utterance);
    }

    els.listenBtn.addEventListener("click", speakCurrent);
    els.restartBtn.addEventListener("click", startGame);
    els.nextBtn.addEventListener("click", () => {
      if (els.nextBtn.textContent.includes("Round")) {
        buildRound();
        return;
      }

      if (els.nextBtn.textContent.includes("오답 복습")) {
        startReview();
        return;
      }

      if (els.nextBtn.textContent.includes("남은 오답")) {
        startReview();
        return;
      }

      if (els.nextBtn.textContent.includes("다시 시작") || els.nextBtn.textContent.includes("새 게임")) {
        startGame();
        return;
      }

      goNext();
    });

    startGame();
  </script>
</body>
</html>
